<div class="w-full z-50 top-0 py-3 sm:py-5 absolute">
  <div class="container flex items-center justify-between text-white">
    <div>
      <span (click)="changeLanguage()" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white bg-blue">
        @if (this.translate.getCurrentLang() === 'en') {
          CAMBIAR A ESPAÑOL
        } @else {
          CHANGE TO ENGLISH
        }
      </span>
    </div>
    <div class="hidden lg:block">
      <ul class="flex items-center">
        <li class="group pl-6"><span (click)="triggerNavItem('#about')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">About</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#services')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Services</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#portfolio')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Portfolio</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#work')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Work</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#statistics')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Statistics</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#blog')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Blog</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
        <li class="group pl-6"><span (click)="triggerNavItem('#contact')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Contact</span><span class="block h-0.5 w-full bg-transparent group-hover:bg-yellow"></span></li>
      </ul>
    </div>
    <div class="block lg:hidden">
      <button (click)="mobileMenu = true">
        <i class="bx bx-menu text-4xl text-white"></i>
      </button>
    </div>
  </div>
</div>

<div class="pointer-events-none fixed inset-0 z-70 min-h-screen bg-black bg-opacity-70 opacity-0 transition-opacity lg:hidden" [ngClass]="{ 'opacity-100 pointer-events-auto': mobileMenu }">
  <div class="absolute right-0 min-h-screen w-2/3 bg-primary py-4 px-8 shadow md:w-1/3">
    <button class="absolute top-0 right-0 mt-4 mr-4" (click)="mobileMenu = false">
  <i class="bx bx-x text-5xl text-white hover:text-yellow transition-colors"></i>
</button>
    <ul class="mt-8 flex flex-col">
      <li class="py-2"><span (click)="triggerNavItem('#about')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">About</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#services')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Services</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#portfolio')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Portfolio</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#work')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Work</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#statistics')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Statistics</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#blog')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Blog</span></li>
      <li class="py-2"><span (click)="triggerNavItem('#contact')" class="cursor-pointer pt-0.5 font-header font-semibold uppercase text-white">Contact</span></li>
    </ul>
  </div>
</div>
