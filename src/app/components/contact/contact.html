<div class="container py-16 md:py-20" id="contact">
  <h2 data-aos="fade-up" class="text-center font-header text-4xl font-semibold uppercase text-primary sm:text-5xl lg:text-6xl">
    Get in touch
  </h2>
  <h4 data-aos="fade-up" data-aos-delay="100" class="pt-6 text-center font-header text-xl font-medium text-black sm:text-2xl lg:text-3xl">
    Have a question or a project in mind?
  </h4>

  <div class="mx-auto w-full pt-10 sm:w-3/4 md:pt-12 lg:w-3/5">
    <form action="https://formspree.io/f/xzdjkwjy" method="POST" class="grid grid-cols-1 gap-6 sm:grid-cols-2">
      
      <div data-aos="fade-right" data-aos-delay="200">
        <label class="block font-body font-medium text-black">Name</label>
        <input name="name" type="text" placeholder="Your name" required
          class="mt-2 w-full rounded border-grey-50 px-4 py-3 font-body text-black shadow focus:border-primary focus:ring-primary" />
      </div>

      <div data-aos="fade-left" data-aos-delay="200">
        <label class="block font-body font-medium text-black">Email</label>
        <input name="email" type="email" placeholder="email@example.com" required
          class="mt-2 w-full rounded border-grey-50 px-4 py-3 font-body text-black shadow focus:border-primary focus:ring-primary" />
      </div>

      <div data-aos="fade-up" data-aos-delay="300" class="sm:col-span-2">
        <label class="block font-body font-medium text-black">Message</label>
        <textarea name="message" rows="6" placeholder="Write your message here..." required
          class="mt-2 w-full rounded border-grey-50 px-4 py-3 font-body text-black shadow focus:border-primary focus:ring-primary"></textarea>
      </div>

      <input type="text" name="_gotcha" style="display:none" />

      <div data-aos="zoom-in" data-aos-delay="400" class="sm:col-span-2 text-center">
        <button type="submit"
          class="mt-6 rounded bg-primary px-10 py-3 font-header text-lg font-bold uppercase text-white transition-all hover:bg-yellow">
          Send Message
        </button>
      </div>
    </form>

    <div class="flex flex-col pt-16 lg:flex-row justify-between">
      <div class="w-full px-8 py-10 shadow md:w-1/3 text-center" data-aos="fade-up" data-aos-delay="500">
        <i class="bx bx-envelope text-4xl text-primary"></i>
        <p class="pt-2 font-body font-bold text-grey-20">My Email</p>
        <p class="font-body text-black">gcastorina234@gmail.com</p>
      </div>
      <div class="mt-8 w-full px-8 py-10 shadow md:mt-0 md:w-1/3 text-center" data-aos="fade-up" data-aos-delay="600">
        <i class="bx bx-map text-4xl text-primary"></i>
        <p class="pt-2 font-body font-bold text-grey-20">Location</p>
        <p class="font-body text-black">Mar del Plata, Argentina</p>
      </div>
      <div class="mt-8 w-full px-8 py-10 shadow md:mt-0 md:w-1/3 text-center" data-aos="fade-up" data-aos-delay="700">
        <i class="bx bxl-linkedin-square text-4xl text-primary"></i>
        <p class="pt-2 font-body font-bold text-grey-20">LinkedIn</p>
        <a href="https://www.linkedin.com/in/gianluca-castorina" target="_blank" class="font-body text-black">in/gianluca-castorina</a>
      </div>
    </div>
  </div>
</div>
